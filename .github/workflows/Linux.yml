name: EightgineWithEditor-Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      Eightgine: ${{ github.workspace }}

    steps:
    - name: "Download project"
      uses: actions/checkout@v3

    - name: "Setup Ubuntu (Dev)"
      run: |
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test
        sudo apt update
        sudo apt install -y build-essential gcc-9 g++-9
        sudo apt install -y libwayland-dev libegl1-mesa-dev
        sudo apt install -y libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxfixes-dev libxi-dev
        sudo apt install -y libasound2-dev libpulse-dev
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 90
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 90
        sudo update-alternatives --config gcc
        sudo update-alternatives --config g++
        sudo snap install cmake --classic
        ldd --version
        nproc

    - name: "Regenerate and Rebuild project"
      run: |
        cd ${Eightgine}/Development
        rm -rf Intermediate
        /snap/bin/cmake -S . -B Intermediate -G Ninja -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
        /snap/bin/cmake --build Intermediate --parallel

    - name: "Package and Upload project"
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.workflow }}
        path: |
          ${{ env.Eightgine }}/Binaries/        
          ${{ env.Eightgine }}/BinariesWithEditor/
          ${{ env.Eightgine }}/Resources/