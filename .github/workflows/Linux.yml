name: EightgineWithEditor-Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      Eightgine: ${{ github.workspace }}

    steps:
    - name: "Download project"
      uses: actions/checkout@v3

    - name: "Setup Ubuntu (Dev)"
      run: |
        sudo apt install -y libwayland-dev libegl1-mesa-dev
        sudo apt install -y libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxfixes-dev libxi-dev
        sudo apt install -y libasound2-dev libpulse-dev
        cmake --version
        gcc --version
        g++ --version
        ldd --version

    - name: "Regenerate and Rebuild project"
      run: |
        cd ${Eightgine}
        rm -rf Intermediate
        cmake -S . -B Intermediate -G Ninja -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
        cmake --build Intermediate --parallel

    - name: "Package and Upload project"
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.workflow }}
        path: |
          ${{ env.Eightgine }}/EmptyProject.app

    - name: "Test project"
      run: |
        cd ${Eightgine}/EmptyProject.app/Contents/Linux
        export SDL_AUDIODRIVER=dummy
        ./EmptyProject