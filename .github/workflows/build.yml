name: EightgineWithEditor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:18.04

    steps:
    - name: "Download project"
      uses: actions/checkout@v3

    - name: "Setup Ubuntu (Dev)"
      run: |
        add-apt-repository ppa:ubuntu-toolchain-r/test
        apt update
        apt install -y build-essential gcc-9 g++-9
        apt install -y libwayland-dev libegl1-mesa-dev
        apt install -y libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxfixes-dev libxi-dev
        apt install -y libasound2-dev libpulse-dev
        update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 90
        update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 90
        update-alternatives --config gcc
        sudo update-alternatives --config g++
        install cmake --classic
        ldd --version

    - name: "Regenerate and Rebuild project"
      run: |
        export Eightgine=${{ github.workspace }}
        cd ${Eightgine}/Development
        rm -rf Intermediate
        /snap/bin/cmake -S . -B Intermediate -G "Ninja" -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
        /snap/bin/cmake --build Intermediate --parallel

    - name: "Package and Upload project"
      uses: actions/upload-artifact@v4
      with:
        name: Eightgine
        path: |
          ${{ github.workspace }}/Binaries/        
          ${{ github.workspace }}/BinariesWithEditor/
          ${{ github.workspace }}/Resources/